name: hr-policy-assistant

x-common-service: &common-service
  restart: unless-stopped
  networks:
    - app-network
  logging:
    driver: json-file
    options:
      max-size: "10m"
      max-file: "3"

services:
  frontend:
    container_name: frontend-builder
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL}
    volumes:
      - frontend_dist:/output
    networks:
      - app-network
    restart: "no"

  nginx:
    container_name: nginx
    <<: *common-service
    image: nginx:1.27-alpine
    ports:
      - "${NGINX_PORT}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - frontend_dist:/usr/share/nginx/html:ro
    depends_on:
      - frontend
      - backend

  backend:
    container_name: backend-app
    <<: *common-service
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: runner
    env_file:
      - ./.env
    environment:
      NODE_ENV: production
      DB_HOST: postgres
      DB_PORT: 5432
      CHROMA_URL: http://chroma:8000
    expose:
      - "3000"
    depends_on:
      - postgres
      - chroma

  postgres:
    container_name: postgres
    <<: *common-service
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_DATABASE}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d ${DB_DATABASE}"]

  chroma:
    container_name: chroma
    <<: *common-service
    image: chromadb/chroma:latest
    expose:
      - "8000"
    volumes:
      - chroma_data:/chroma/chroma
    
volumes:
  frontend_dist:
    name: hr-assistant-frontend-dist
  postgres_data:
    name: hr-assistant-postgres
  chroma_data:
    name: hr-assistant-chroma

networks:
  app-network:
    name: hr-assistant-network
    driver: bridge
