name: hr-policy-assistant

x-common-service: &common-service
  restart: unless-stopped
  networks:
    - app-network
  logging:
    driver: json-file
    options:
      max-size: "10m"
      max-file: "3"

services:
  frontend:
    container_name: frontend-builder
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL}
    volumes:
      - frontend_dist:/output
    networks:
      - app-network
    restart: "no"

  nginx:
    container_name: nginx
    <<: *common-service
    image: nginx:1.27-alpine
    ports:
      - "${NGINX_PORT}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - frontend_dist:/usr/share/nginx/html:ro
    depends_on:
      - frontend
      - backend

  backend:
    container_name: backend-app
    <<: *common-service
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: runner
    env_file:
      - ./.env
    environment:
      NODE_ENV: production
      DB_HOST: postgres
      DB_PORT: 5432
      QDRANT_URL: http://qdrant:6333
    expose:
      - "3000"
    depends_on:
      - postgres
      - qdrant

  postgres:
    container_name: postgres
    <<: *common-service
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_DATABASE}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d ${DB_DATABASE}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  qdrant:
    container_name: qdrant
    <<: *common-service
    image: qdrant/qdrant:v1.17.1
    expose:
      - "6333"
    volumes:
      - qdrant_data:/qdrant/storage

volumes:
  frontend_dist:
    name: hr-assistant-frontend-dist
  postgres_data:
    name: hr-assistant-postgres
  qdrant_data:
    name: hr-assistant-qdrant

networks:
  app-network:
    name: hr-assistant-network
    driver: bridge
