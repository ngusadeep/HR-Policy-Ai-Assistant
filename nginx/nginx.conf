worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile    on;
    tcp_nopush  on;
    keepalive_timeout 65;

    # ── Structured JSON access logs ───────────────────────────────────────────
    log_format json_combined escape=json
        '{'
            '"time":"$time_iso8601",'
            '"method":"$request_method",'
            '"uri":"$request_uri",'
            '"status":$status,'
            '"bytes":$body_bytes_sent,'
            '"duration":$request_time,'
            '"remote_addr":"$remote_addr",'
            '"upstream":"$upstream_addr"'
        '}';

    access_log /var/log/nginx/access.log json_combined;
    error_log  /var/log/nginx/error.log  warn;

    # ── Backend upstream ──────────────────────────────────────────────────────
    upstream backend {
        server backend:3000;
        keepalive 32;
    }

    # ── Rate limiting zones ───────────────────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=api_limit:10m  rate=20r/s;
    limit_req_zone $binary_remote_addr zone=ws_limit:10m   rate=5r/s;
    limit_req_zone $binary_remote_addr zone=web_limit:10m  rate=50r/s;

    server {
        listen 80;
        server_name _;

        # ── Security headers ─────────────────────────────────────────────────
        add_header X-Frame-Options        "SAMEORIGIN"    always;
        add_header X-Content-Type-Options "nosniff"       always;
        add_header X-XSS-Protection       "1; mode=block" always;
        add_header Referrer-Policy        "no-referrer"   always;
        server_tokens off;

        # Max upload size for document ingestion
        client_max_body_size 20m;

        # ── WebSocket — /ws/** ───────────────────────────────────────────────
        location /ws/ {
            limit_req zone=ws_limit burst=10 nodelay;

            proxy_pass         http://backend;
            proxy_http_version 1.1;

            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Keep alive for long RAG streaming sessions
            proxy_read_timeout  3600s;
            proxy_send_timeout  3600s;
            proxy_connect_timeout 10s;
        }

        # ── REST API — /api/** ───────────────────────────────────────────────
        location /api/ {
            limit_req zone=api_limit burst=40 nodelay;

            proxy_pass         http://backend;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_read_timeout  60s;
            proxy_send_timeout  60s;
            proxy_connect_timeout 10s;
        }

        # ── Frontend static files — served directly from Docker volume ────────
        root /usr/share/nginx/html;
        index index.html;

        # Hashed assets (JS/CSS chunks from Vite) — cache forever
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            limit_req zone=web_limit burst=200 nodelay;
            expires 1y;
            add_header Cache-Control "public, immutable";
            try_files $uri =404;
        }

        # SPA fallback — all other routes serve index.html
        location / {
            limit_req zone=web_limit burst=100 nodelay;
            try_files $uri $uri/ /index.html;
            add_header Cache-Control "no-store";
        }
    }
}
